# %activity_isafk% - получить информацию, в афк игрок или нет на данный момент

#  %activity_time1% - время за вообще все время
#  %activity_time2%
#  %activity_time3%

#  %activity_afktime% - время афк
#  %activity_activetime% - время активное время, остальное все также как и ниже
#
#  %activity_time1_1%  - наигранное время за последний 1 день
#  %activity_time1_1_1%  - наигранное время за последний 1 день один день назад
#  %activity_points% - очки за все время БД
