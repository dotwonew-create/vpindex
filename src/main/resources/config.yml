settings:
  afk-threshold: 5m #требуемое время, через которое если игрок бездействует, то значит он встает в состояние AFK
  update-time: 1h #время для обновления статистики в плейсхолдере %activity_index%
  clear: 40d #Удаление статистики
  total-time: 30 #время для %activity_index%
  white-list: true #если включено то игроки которые не в вайтлисте не будут вообще считаться

  hologram-distance: 10 #расстояние с которого голограммы начинают обновляться
  holograms-update-timer: 1 #таймер обновления голограмм (в секундах)

